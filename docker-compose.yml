services:
  dashboard-md:
    build: .
    container_name: md-dashboard-md
    environment:
      - PORT=${PORT:-8743}
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:?required}
      - UPLOAD_SECRET=${UPLOAD_SECRET:-}
      - APP_TITLE=${APP_TITLE:-Massive Dynamic}
      - AVAILABLE_SECONDS=${AVAILABLE_SECONDS:-39900}
      - TAKT_SECONDS=${TAKT_SECONDS:-2216.666667}
      - DATA_FILE=${DATA_FILE:-/app/data/stations.csv}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REQUEST_LOG_LEVEL=${REQUEST_LOG_LEVEL:-INFO}
      - PWA_START_URL=${PWA_START_URL:-}
      - PWA_SCOPE=${PWA_SCOPE:-}
    expose:
      - "8743"
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.services.dashboard-md.loadbalancer.server.port=8743"
    restart: unless-stopped
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8743/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  coolify:
    external: true
